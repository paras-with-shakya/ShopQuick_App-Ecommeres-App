org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Network timeout settings for gradle
org.gradle.internal.http.connectionTimeout=120000
org.gradle.internal.http.socketTimeout=120000

# Disable incremental compilation to fix Kotlin cache issues
kotlin.incremental=false

# Gradle daemon settings
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:+ParallelGC

# Enable offline mode if needed (comment out if you have internet)
# org.gradle.offline=true
